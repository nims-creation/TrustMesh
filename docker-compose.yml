version: '3.8'

services:
  trustmesh-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trustmesh-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - UPI_MESH_MAX_HOPS=10
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

