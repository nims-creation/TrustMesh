# ============================================================
# Production profile — activate with: --spring.profiles.active=prod
# ============================================================

# Disable H2 web console in production — it exposes the raw database
spring.h2.console.enabled=false

# In production, replace H2 with PostgreSQL (uncomment and fill these):
# spring.datasource.url=jdbc:postgresql://localhost:5432/upimesh
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=upimesh_user
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.hibernate.ddl-auto=validate

# Reduce log verbosity in production
logging.level.com.demo.upimesh=WARN
