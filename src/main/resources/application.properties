# =============================================================
# TrustMesh — application.properties (dev / default profile)
# For production overrides, use application-prod.properties
# =============================================================

# ---- Server ----
# Railway/Render sets PORT env var; fall back to 8080 locally
server.port=${PORT:8080}

# ---- Database (H2 in-memory, zero-setup for the demo) ----
spring.datasource.url=jdbc:h2:mem:upimesh
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Suppress the "open-in-view" warning (acceptable in demo context)
spring.jpa.open-in-view=false

# ---- H2 Web Console (dev only — disabled in prod profile) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Restrict H2 console to localhost connections only
spring.h2.console.settings.web-allow-others=false

# ---- Logging ----
logging.level.com.demo.upimesh=INFO
# Show which class/method each log line comes from
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---- Business Configuration ----
# Idempotency cache: how long a packet hash is remembered before eviction.
# A real system would use Redis TTL here. In dev, the cache lives for the JVM lifetime.
upi.mesh.idempotency-ttl-seconds=86400

# Freshness window: packets older than this many seconds are rejected as replays.
# 24h matches UPI's real offline transaction expiry window.
upi.mesh.packet-max-age-seconds=86400

# Max number of hops a packet can travel before being dropped
upi.mesh.max-hops=10

# Enable HTTP Response Compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

# ---- Flyway (disabled in dev — H2 uses ddl-auto=create-drop instead) ----
# Flyway is only enabled in the 'prod' profile (PostgreSQL)
spring.flyway.enabled=false
